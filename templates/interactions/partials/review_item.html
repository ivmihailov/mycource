<article class="surface-soft p-5 feedback-card" data-ui="review-item">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="font-semibold">{{ review.author.username }}</p>
            <p class="muted-text text-sm">{{ review.updated_at|date:"d.m.Y H:i" }}</p>
        </div>
        {% include "partials/rating_display.html" with rating=review.rating count=None %}
    </div>
    <p class="mt-4 whitespace-pre-line text-sm">{{ review.body|default:"Без текстового отзыва." }}</p>
</article>
