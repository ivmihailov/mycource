{% if is_paginated %}
    <nav class="pagination-nav" aria-label="Пагинация">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}" class="pagination-nav__link">Назад</a>
        {% endif %}
        <span class="pagination-nav__meta">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}" class="pagination-nav__link">Вперед</a>
        {% endif %}
    </nav>
{% endif %}
